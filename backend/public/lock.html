<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>The Architect's Blueprint</title>
<meta name="description" content="Enter your license key to access the book.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
  min-height: 100vh;
  min-height: 100svh;
  display: flex; align-items: center; justify-content: center;
  background-color: #08111e;
  background-image:
    linear-gradient(rgba(0,100,200,0.18) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,100,200,0.18) 1px, transparent 1px),
    linear-gradient(rgba(0,100,200,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,100,200,0.07) 1px, transparent 1px);
  background-size: 80px 80px, 80px 80px, 16px 16px, 16px 16px;
  padding: 1.5rem;
  -webkit-font-smoothing: antialiased;
}

/* Corner registration marks */
.corner {
  position: fixed; width: 44px; height: 44px;
  border-color: rgba(0,113,227,0.45); border-style: solid;
}
.tl { top: 1.5rem; left: 1.5rem;  border-width: 1.5px 0 0 1.5px; }
.tr { top: 1.5rem; right: 1.5rem; border-width: 1.5px 1.5px 0 0; }
.bl { bottom: 1.5rem; left: 1.5rem;  border-width: 0 0 1.5px 1.5px; }
.br { bottom: 1.5rem; right: 1.5rem; border-width: 0 1.5px 1.5px 0; }

/* Card */
.card {
  width: 100%; max-width: 420px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 16px;
  padding: 2.5rem 2rem;
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 24px 64px rgba(0,0,0,0.5);
}

/* Lock icon */
.lock-icon {
  width: 48px; height: 48px;
  background: rgba(0,113,227,0.15);
  border: 1px solid rgba(0,113,227,0.3);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem;
  font-size: 22px;
}

.book-title {
  text-align: center;
  margin-bottom: 0.35rem;
}
.book-eyebrow {
  font-size: 10.5px; font-weight: 500;
  letter-spacing: 0.3em; text-transform: uppercase;
  color: rgba(255,255,255,0.45);
  text-align: center; margin-bottom: 0.3rem;
}
.book-name {
  font-size: 1.6rem; font-weight: 700;
  letter-spacing: -0.03em; line-height: 1;
  color: #5bb8ff;
  text-shadow: 0 0 30px rgba(91,184,255,0.35);
  text-align: center; margin-bottom: 1.75rem;
}

.divider {
  border: none; border-top: 1px solid rgba(255,255,255,0.08);
  margin-bottom: 1.75rem;
}

label {
  display: block;
  font-size: 11.5px; font-weight: 600;
  letter-spacing: 0.06em; text-transform: uppercase;
  color: rgba(255,255,255,0.5);
  margin-bottom: 0.5rem;
}

input[type="text"] {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 0.75rem 1rem;
  font-size: 15px; font-weight: 500;
  color: #ffffff;
  font-family: 'SF Mono', 'JetBrains Mono', 'Courier New', monospace;
  letter-spacing: 0.05em;
  outline: none;
  transition: border-color 150ms, background 150ms;
  margin-bottom: 0.5rem;
}
input[type="text"]::placeholder { color: rgba(255,255,255,0.25); letter-spacing: 0.02em; font-family: inherit; }
input[type="text"]:focus {
  border-color: rgba(0,113,227,0.7);
  background: rgba(0,113,227,0.08);
}

.hint {
  font-size: 11.5px; color: rgba(255,255,255,0.35);
  margin-bottom: 1.25rem; line-height: 1.55;
}
.hint a { color: rgba(91,184,255,0.8); text-decoration: none; }
.hint a:hover { color: #5bb8ff; }

button[type="submit"] {
  width: 100%;
  background: #0071e3;
  color: #ffffff;
  border: none; border-radius: 10px;
  padding: 0.82rem;
  font-size: 15px; font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: background 150ms, transform 180ms, box-shadow 180ms;
  box-shadow: 0 4px 16px rgba(0,113,227,0.4);
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
button[type="submit"]:hover  { background: #0077ed; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,113,227,0.5); }
button[type="submit"]:active { transform: scale(0.98); }
button[type="submit"]:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

.error-msg {
  margin-top: 0.85rem;
  background: rgba(239,68,68,0.12);
  border: 1px solid rgba(239,68,68,0.25);
  border-radius: 8px;
  padding: 0.65rem 0.85rem;
  font-size: 13px; color: #fca5a5;
  display: none;
}
.error-msg.show { display: block; }

.spinner {
  width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,0.3);
  border-top-color: #fff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

.free-link {
  text-align: center; margin-top: 1.5rem;
  font-size: 12px; color: rgba(255,255,255,0.3);
}
.free-link a { color: rgba(91,184,255,0.6); text-decoration: none; }
.free-link a:hover { color: #5bb8ff; }
</style>
</head>
<body>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="card">
  <div class="lock-icon">&#128274;</div>
  <div class="book-eyebrow">The Architect's</div>
  <div class="book-name">Blueprint</div>
  <hr class="divider">

  <form id="unlock-form">
    <label for="key">License Key</label>
    <input
      type="text"
      id="key"
      name="license_key"
      placeholder="XXXX-XXXX-XXXX-XXXX"
      autocomplete="off"
      autocapitalize="characters"
      spellcheck="false"
      required
    >
    <p class="hint">
      Your key was emailed to you after purchase.
      Don't have one? <a href="https://abhay-2222.gumroad.com/l/architects-blueprint" target="_blank">Get the book</a>
    </p>
    <button type="submit" id="submit-btn">
      <span id="btn-text">Unlock Book</span>
      <div class="spinner" id="spinner"></div>
    </button>
    <div class="error-msg" id="error-msg"></div>
  </form>

  <p class="free-link">
    <a href="https://abhay-2222.github.io/architects-blueprint/" target="_blank">
      Read free preview (Chapter 1 + 2) &#8594;
    </a>
  </p>
</div>

<script>
document.getElementById('unlock-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  const key     = document.getElementById('key').value.trim();
  const btn     = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  const spinner = document.getElementById('spinner');
  const errMsg  = document.getElementById('error-msg');

  // Reset error
  errMsg.classList.remove('show');
  errMsg.textContent = '';

  // Loading state
  btn.disabled    = true;
  btnText.textContent = 'Verifying...';
  spinner.style.display = 'block';

  try {
    const res  = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ license_key: key })
    });
    const data = await res.json();

    if (data.success) {
      btnText.textContent = 'Unlocked!';
      spinner.style.display = 'none';
      // Small delay so the user sees the confirmation
      setTimeout(() => window.location.href = '/', 400);
    } else {
      throw new Error(data.error || 'Invalid license key.');
    }

  } catch(err) {
    errMsg.textContent = err.message;
    errMsg.classList.add('show');
    btn.disabled = false;
    btnText.textContent = 'Unlock Book';
    spinner.style.display = 'none';
  }
});

// Auto-format key input: uppercase and insert hyphens
document.getElementById('key').addEventListener('input', function() {
  let val = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  if (val.length > 4)  val = val.slice(0,4)  + '-' + val.slice(4);
  if (val.length > 9)  val = val.slice(0,9)  + '-' + val.slice(9);
  if (val.length > 14) val = val.slice(0,14) + '-' + val.slice(14);
  if (val.length > 19) val = val.slice(0,19);
  this.value = val;
});
</script>
</body>
</html>
